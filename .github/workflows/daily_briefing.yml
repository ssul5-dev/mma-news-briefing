name: Daily MMA News AI Briefing (PlayMCP)

on:
  schedule:
    - cron: '0 22 * * *'  # 매일 한국 시간(KST) 오전 7시 (UTC 22:00)
  repository_dispatch:
    types: [daily-briefing]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install mcporter
      run: |
        npm install -g mcporter

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: 'mma-news-briefing/requirements.txt'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r mma-news-briefing/requirements.txt

    - name: Run Briefing Script
      env:
        PLAYMCP_ACCESS_TOKEN: ${{ secrets.PLAYMCP_ACCESS_TOKEN }}
        PLAYMCP_REFRESH_TOKEN: ${{ secrets.PLAYMCP_REFRESH_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # GitHub CLI utilizes GH_TOKEN to update repository secrets
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        python mma-news-briefing/main_playmcp.py

    - name: Upload Generated Audio and Web Player to GitHub
      env:
        GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      run: |
        python mma-news-briefing/upload_to_github.py
